<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redditwrapper</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Redditwrapper</h1>
    <p class="subtitle">Local Reddit keyword monitor with Aho-Corasick matching</p>
  </header>

  <main>
    <section class="panel keywords-panel">
      <h2>Keywords</h2>
      <p class="hint">One keyword per line. Saved locally to <code>data/keywords.json</code>.</p>
      <textarea id="keywords-input" rows="6" placeholder="web design&#10;freelance&#10;startup advice"></textarea>
      <div class="row">
        <button id="save-keywords" class="btn primary">Save Keywords</button>
        <span id="keyword-status" class="status-text"></span>
      </div>
    </section>

    <section class="panel control-panel">
      <h2>Listener</h2>
      <div class="row">
        <button id="start-btn" class="btn success">Start</button>
        <button id="stop-btn" class="btn danger" disabled>Stop</button>
        <span id="listener-badge" class="badge stopped">Stopped</span>
      </div>
      <div id="listener-stats" class="stats"></div>
      <div id="health" class="health"></div>
    </section>

    <div class="feeds">
      <section class="panel feed-panel">
        <h2>Live Matches</h2>
        <div id="matches-feed" class="feed"></div>
      </section>

      <section class="panel feed-panel">
        <h2>Reply Queue</h2>
        <p class="hint">Auto-replies generated by local Ollama.</p>
        <div id="reply-feed" class="feed"></div>
      </section>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
