<!DOCTYPE html>
<html>

<head>
    <title>Moderation Panel</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

    <h2>Pending Posts</h2>
    <div id="list"></div>

    <script>
        async function loadPosts() {
            console.log("hi");
            const res = await fetch("/api/raw");
            const posts = await res.json();

            const container = document.getElementById("list");
            container.innerHTML = "";

            posts.map((p, index) => {
                console.log(index);
                const div = document.createElement("div");
                div.className = "item";

                div.innerHTML = `
        <strong>${p.Title}</strong><br>
        Company: ${p.companyName}<br>
        <a href="${p.Link}" target="_blank">Open Post</a><br>
        <br>
        <input type="checkbox" data-id="${p.PostID}"  class="approve"> Approve
        <input type="checkbox" data-id="${p.PostID}" class="delete"> Delete
      `;

                //approve or delete
                div.querySelector(".approve").addEventListener("change", async (e) => {
                    if (e.target.checked) {
                        console.log(index);
                        const res = await fetch("/api/approve", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ index })
                        });

                        const data = await res.json();
                        if (data.success) {
                            loadPosts(); //re-render
                            alert("Post approved!");
                            container.removeChild(div);
                        }
                    }
                });

                div.querySelector(".delete").addEventListener("change", async (e) => {
                    if (e.target.checked) {
                        console.log(index);
                        const res = await fetch("/api/delete", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ index })
                        });

                        const data = await res.json();
                        if (data.success) {
                            loadPosts(); //re-renders
                            alert("Post Deleted!");
                            container.removeChild(div);
                        }
                    }
                });


                container.appendChild(div);
            });

        }

        loadPosts();
    </script>

</body>

</html>
